<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chic Market Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        market: {
                            bg: '#F2F4F7',
                            navy: '#2D4D7A',
                            slate: '#B7C7E6',
                            blue: '#9BBEFF',
                            yellow: '#FFEAA0',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#F2F4F7] text-[#2D4D7A] font-sans antialiased min-h-screen p-6">

    <nav class="max-w-5xl mx-auto flex justify-between items-center mb-10">
        <div class="text-xl font-bold tracking-tight text-[#2D4D7A]">curate.<span class="text-[#9BBEFF]">market</span></div>
        <div class="flex items-center space-x-6">
            <span class="bg-[#FFEAA0] text-[#2D4D7A] px-3 py-1 rounded-full text-xs font-semibold tracking-wide">SIMULATOR MODE</span>
            <div class="w-8 h-8 rounded-full bg-[#2D4D7A] flex items-center justify-center text-white text-xs font-medium">U</div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <div class="md:col-span-2 space-y-6">
            <div class="bg-white rounded-3xl p-8 shadow-sm border border-[#B7C7E6]/20">
                <p class="text-xs font-medium uppercase tracking-widest text-[#B7C7E6]">Investing Balance</p>
                <h1 class="text-4xl font-extrabold tracking-tight text-[#2D4D7A] mt-1">$10,000.00</h1>
                <p class="text-sm font-semibold text-[#9BBEFF] mt-1">+$420.50 (4.38%) Today</p>
                
                <div class="h-64 mt-8 flex items-end justify-center border-b border-[#B7C7E6]/30 relative">
                    <svg class="absolute bottom-0 w-full h-40" viewBox="0 0 100 100" preserveAspectRatio="none">
                        <path d="M0,80 Q25,30 50,60 T100,10" fill="none" stroke="#9BBEFF" stroke-width="3" stroke-linecap="round"/>
                    </svg>
                    <div class="absolute inset-0 flex items-center justify-center bg-[#9BBEFF]/5 rounded-xl opacity-0 hover:opacity-100 transition-opacity">
                        <span class="text-xs font-medium bg-[#2D4D7A] text-white px-3 py-1.5 rounded-lg shadow-md">Interactive Chart Coming Soon</span>
                    </div>
                </div>
                
                <div class="flex justify-between mt-6 text-xs font-bold tracking-wider px-2">
                    <button class="text-[#9BBEFF] border-b-2 border-[#9BBEFF] pb-1">1D</button>
                    <button class="text-[#B7C7E6] hover:text-[#2D4D7A] transition-colors">1W</button>
                    <button class="text-[#B7C7E6] hover:text-[#2D4D7A] transition-colors">1M</button>
                    <button class="text-[#B7C7E6] hover:text-[#2D4D7A] transition-colors">3M</button>
                    <button class="text-[#B7C7E6] hover:text-[#2D4D7A] transition-colors">1Y</button>
                </div>
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-[#B7C7E6]/20">
                <h3 class="text-sm font-bold uppercase tracking-wider text-[#2D4D7A] mb-4">Watchlist</h3>
                
                <div class="flex justify-between items-center py-3 border-b border-[#F2F4F7]">
                    <div>
                        <p class="font-bold text-sm text-[#2D4D7A]">AAPL</p>
                        <p class="text-xs text-[#B7C7E6]">Apple Inc.</p>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-sm text-[#2D4D7A]">$182.40</p>
                        <span class="text-[10px] font-bold text-white bg-[#9BBEFF] px-2 py-0.5 rounded-full">+1.2%</span>
                    </div>
                </div>

                <div class="flex justify-between items-center py-3">
                    <div>
                        <p class="font-bold text-sm text-[#2D4D7A]">BTC</p>
                        <p class="text-xs text-[#B7C7E6]">Bitcoin</p>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-sm text-[#2D4D7A]">$67,500.00</p>
                        <span class="text-[10px] font-bold text-white bg-[#9BBEFF] px-2 py-0.5 rounded-full">+4.8%</span>
                    </div>
                </div>
            </div>
        </div>

    </main>
</body>
</html>
