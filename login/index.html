<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | Robinhood Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F5F7FA] text-[#1E3557] font-sans antialiased min-h-screen flex items-center justify-center p-6">
    <div class="bg-white rounded-3xl p-8 shadow-sm border border-[#8A9DBB]/10 max-w-md w-full text-center space-y-6">
        <div class="text-xl font-black tracking-tighter uppercase">ROBINHOOD<span class="text-[#709DFF] font-light">.SIM</span></div>
        <h2 class="text-2xl font-black tracking-tight">Welcome back</h2>
        <p class="text-xs font-semibold text-[#8A9DBB]">Enter any mock credentials to initialize your platform session.</p>
        
        <div class="space-y-4 text-left">
            <div>
                <label class="text-[10px] font-bold uppercase tracking-wider text-[#1E3557]/60 block mb-1">Email Address</label>
                <input type="email" value="demo@simulator.com" class="w-full bg-[#F5F7FA] text-xs font-semibold rounded-xl px-4 py-3 focus:outline-none border border-transparent focus:border-[#FFF1C2]">
            </div>
            <div>
                <label class="text-[10px] font-bold uppercase tracking-wider text-[#1E3557]/60 block mb-1">Password</label>
                <input type="password" value="••••••••" class="w-full bg-[#F5F7FA] text-xs font-semibold rounded-xl px-4 py-3 focus:outline-none border border-transparent focus:border-[#FFF1C2]">
            </div>
        </div>

        <button onclick="handleLogin()" class="w-full bg-[#1E3557] text-white font-extrabold text-xs py-3.5 rounded-xl hover:opacity-90 transition-all shadow-sm">LOG IN TO SIMULATOR</button>
    </div>

    <script>
        function handleLogin() {
            localStorage.setItem('sim_logged_in', 'true');
            // Route perfectly back to the main homepage dashboard
            window.location.href = '../';
        }
    </script>
</body>
</html>
